- hosts: app
  become: true
  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Copy image to host
      copy:
        src: /tmp/task-tracker-{{ image_tag }}.tar
        dest: /tmp/task-tracker-{{ image_tag }}.tar

    - name: Load image
      shell: docker load -i /tmp/task-tracker-{{ image_tag }}.tar

    - name: Stop existing container
      shell: docker rm -f task-tracker || true

    - name: Run container
      shell: >
        docker run -d --name task-tracker
        -p 5000:5000
        -e DYNAMODB_TABLE=tasks
        -e AWS_REGION=us-east-1
        -e AWS_ACCESS_KEY_ID={{ aws_access_key }}
        -e AWS_SECRET_ACCESS_KEY={{ aws_secret_key }}
        task-tracker:{{ image_tag }}
